<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Bike Rental</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f0f7f0;
}

/* HEADER */
header {
  background:#1b5e20;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-size:24px;
  font-weight:bold;
}

.logo span {
  color:#00e676;
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

/* GRID OFERTA */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.price {
  color:#1b5e20;
  font-weight:bold;
}

button {
  background:#2e7d32;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  width:100%;
  cursor:pointer;
}

/* FORM */
.form-box {
  margin-top:30px;
  background:white;
  padding:15px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>
<div class="logo">⚡ E<span>-Bike</span></div>
<nav>
<a href="index.html">Oferta</a>
<a href="regulamin.html">Regulamin</a>
<a href="ofirmie.html">O firmie</a>
</nav>
</header>

<div class="container">

<h2>Dostępne rowery elektryczne</h2>

<div class="grid">

<!-- GENERUJEMY 15 ROWERÓW -->
<script>
for(let i=1;i<=15;i++){
document.write(`
<div class="card">
<img src="https://images.unsplash.com/photo-1518655048521-f130df041f66">
<div class="card-body">
<h3>E-Bike ${i}</h3>
<p>Stan: sprawny</p>
<p class="price">${120 + (i*5)} zł / miesiąc</p>
<button onclick="selectBike(${i})">Rezerwuj</button>
</div>
</div>
`);
}
</script>

</div>

<div class="form-box">
<h3>Rezerwacja</h3>

<form>
<label>Wybrany rower:</label><br>
<input id="bike" readonly><br><br>

<label>Imię:</label><br>
<input required><br><br>

<label>Email:</label><br>
<input type="email" required><br><br>

<button type="submit">Potwierdź</button>
</form>

<h3>Płatność</h3>
<button onclick="alert('Płatność kartą')">Karta</button>
<button onclick="alert('Przelew bankowy')">Przelew</button>

</div>

</div>

<script>
function selectBike(n){
document.getElementById("bike").value="E-Bike " + n;
}
</script>

</body>
</html>
